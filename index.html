<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Meta - Melhora SEO -->
    <meta
      name="description"
      content="Le Chic Íntima - Moda íntima com elegância e conforto. Entregamos para todo o Brasil."
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;"
    />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="theme-color" content="#7b1b38" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <title>Le Chic Íntima</title>
    <link rel="shortcut icon" href="img/favicon.webp" type="image/x-icon" />
    <link rel="apple-touch-icon" sizes="180X180" href="img/favicon.webp" />
    <link rel="stylesheet" href="style.css" />

    <!-- Font Awesome (Versão 6.5.1) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Barra de Aviso (Topo) -->
    <header id="header">
      <div class="carrinho">
        <p>Entregamos para todo o Brasil!</p>
        <img src="img/icon-carinho.svg" alt="Carinho de envio" />
      </div>
    </header>

    <!-- Cabeçalho e MENU -->
    <nav id="menu">
      <div class="leftMenu">
        <a href="#" aria-label="Menu"><i class="fa-solid fa-bars"></i></a>
        <a href="#" aria-label="Buscar"
          ><i class="fa-solid fa-magnifying-glass"></i
        ></a>
      </div>

      <!-- Título principal da página -->
      <div class="centerLogo">
        <h1>lechicintima.com.br</h1>
      </div>

      <div class="rightMenu">
        <a href="#" aria-label="Carrinho de compras"
          ><i class="fa-solid fa-bag-shopping"></i
        ></a>
      </div>
    </nav>

    <!-- Banner Principal -->
    <div class="banner">
      <img src="img/banner1.webp" alt="Banner Principal" loading="lazy" />
      <h2>Elegância e Conforto em Cada Detalhe</h2>
    </div>

    <!-- Grid de Produtos -->
    <div class="lingerie">
      <p>LINGERIE</p>
    </div>

    <div class="carrossel">
      <button class="arrow left">&#10094;</button>
      <div class="carrossel-container">
        <div class="carrossel-fotos">
          <img src="img/foto3.webp" alt="" />
          <img src="img/foto4.webp" alt="" />
          <img src="img/foto5.webp" alt="" />
          <img src="img/foto9.webp" alt="" />
          <img src="img/foto14.webp" alt="" />
          <img src="img/foto15.webp" alt="" />
          <img src="img/foto17.webp" alt="" />
          <img src="img/foto18.webp" alt="" />
        </div>
      </div>

      <button class="arrow right">&#10095;</button>
    </div>
  </body>
  <script src="JS/script.js"></script>
</html>
